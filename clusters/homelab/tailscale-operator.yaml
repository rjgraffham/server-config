apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 15m
  targetNamespace: tailscale
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./tailscale-operator
  prune: true
  patches:  # patch out the upstream yaml's empty secret - will be created out of band
    - patch: |
        - op: delete
      target:
        kind: Secret
        name: operator-oauth
        namespace: tailscale
